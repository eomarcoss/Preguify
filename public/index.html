<!doctype html>
<html lang="pt-br" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preguify - Republica sem preguiça</title>

    <link rel="icon" type="image/svg+xml" href="/img/preguify.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- <link rel="stylesheet" href="css/headers.css" /> -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  </head>
  <body>
    <header
      class="d-flex justify-content-center lign-items-center py-0 bg-body gap-3 mt-0"
    >
      <ul
        class="nav nav-pills d-flex justify-content-center align-items-center gap-3"
      >
        <li
          style="
            display: inline-flex;
            align-items: center;
            width: fit-content;
            padding: 0;
            list-style: none;
          "
        >
          <img
            src="/img/preguify.svg"
            class="preguify"
            width="50px"
            height="auto"
            style="object-fit: contain; display: block"
            id=""
          />
        </li>
        <li class="nav-item">
          <a
            href="#"
            class="nav-link active py-3"
            onclick="loadPage(event, 'pages/usuarios.html', this)"
          >
            Usuarios
          </a>
        </li>

        <li class="nav-item">
          <a
            href="#"
            class="nav-link py-3"
            onclick="loadPage(event, 'pages/criartask.html', this)"
          >
            Criar tarefa
          </a>
        </li>

        <li class="nav-item">
          <a
            href="#"
            class="nav-link py-3"
            onclick="loadPage(event, 'pages/tarefas.html', this)"
          >
            Tarefas
          </a>
        </li>

        <li class="nav-item">
          <a
            href="#"
            class="nav-link py-3"
            onclick="loadPage(event, 'pages/ranking.html', this)"
          >
            Ranking
          </a>
        </li>

        <li class="nav-item">
          <button
            id="themeToggle"
            class="nav-link py-3 btn btn-link"
            style="border: none; background: none; padding: 0.75rem 0.5rem"
            title="Alternar tema"
          >
            <i class="bi bi-moon-stars" id="themeIcon"></i>
          </button>
        </li>
      </ul>
    </header>

    <div class="container-fluid">
      <div class="w-100" id="content"></div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/scriptNovo.js"></script>
    <script src="js/navigation.js"></script>
  </body>
</html>
